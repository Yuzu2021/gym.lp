<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
}

/* 画像 */
img {
  width: 100%;
  display: block;
}

/* セクション */
section {
  padding: 60px 20px;
  text-align: center;
}

/* CTA */
.cta {
  background: linear-gradient(45deg, #ffcc00, #ff6600);
  color: #000;
}

/* カード */
.card {
  background: rgba(0,0,0,0.7);
  margin: 10px auto;
  padding: 20px;
  max-width: 300px;
  border-radius: 10px;
}

/* LINEボタン */
.line-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00c300;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  animation: bounce 1.5s infinite;
}

/* 電話ボタン（固定） */
.tel-fixed {
  position: fixed;
  bottom: 20px;
  right: 140px;
  background: #ff6600;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  animation: bounce 1.5s infinite;
}

/* 画像内電話タップ */
.tel-wrap {
  position: relative;
}

.tel-btn {
  position: absolute;
  top: 72%;   /* ←ここで電話番号位置調整 */
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 60px;
}

/* アニメーション */
@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* 見出し */
.gold {
  color: #ffcc00;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- バナー -->
<img src="./banner.gym.jpg">

<!-- CTA -->
<section class="cta">
  <h2>🌟今だけ‼️入会金無料🌟</h2>
 <p style="font-size: 39px;">
  <strong>「500円」で体験！！</strong>
</p>

<!-- 外観 -->
<img src="./gaikan.jpg">

<!-- コンセプト -->
<section>
  <h2>✨理想の身体を手に入れる✨</h2>
  <p class="gold">本気で変わりたいあなたへ</p>
</section>

<!-- 内装 -->
<img src="./S__71884805_0.jpg">

<!-- メイン -->
<img src="./gym.k.jpg">

<!-- 強み -->
<section>
  <h2>【選ばれる理由】</h2>

  <div class="card">💪知識豊富なプロからの指導</div>
  <div class="card">🍖食事サポートあり</div>
  <div class="card">🏋️大会入賞者在籍</div>

</section>

<!-- トレーナー -->
<img src="./3.jpg">
<img src="./2.jpg">




<!-- 体験 -->
<section>
  <h2>⭐️500円体験（30分）⭐️</h2>
</section>

<!-- 画像 -->
<img src="./gym.500yen.jpg">
<img src="./images.gym.jpeg">

<!-- 電話画像 -->
<div class="tel-wrap">
  <img src="./lp.gym.jpg">
  <a href="tel:09023559371" class="tel-btn"></a>
</div>

<!-- 固定ボタン -->
<a href="tel:09023559371" class="tel-fixed">
  📞 電話する
</a>

<a href="https://lin.ee/98zcZXy" class="line-btn">
  LINE予約
</a>

</body>
</html>
