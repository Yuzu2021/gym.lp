<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
}

/* 画像 */
img {
  width: 100%;
  display: block;
}

/* セクション */
section {
  padding: 60px 20px;
  text-align: center;
}

/* CTA */
.cta {
  background: linear-gradient(45deg, #ffcc00, #ff6600);
  color: #000;
}

/* カード */
.card {
  background: rgba(0,0,0,0.7);
  margin: 10px auto;
  padding: 20px;
  max-width: 300px;
  border-radius: 10px;
}

/* LINEボタン（動く） */
.line-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00c300;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);

  animation: bounce 1.5s infinite;
}

/* アニメーション */
@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* 見出し */
.gold {
  color: #ffcc00;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- バナー -->
<img src="./banner.gym.jpg">

<!-- CTA -->
<section class="cta">
  <h2>🌟入会金無料🌟</h2>
  <p><strong>500円で体験‼️</strong></p>
</section>

<!-- コンセプト -->
<section>
  <h2>✨理想の身体を手に入れる✨</h2>
  <p class="gold">本気で変わりたいあなたへ</p>
</section>

<!-- メイン画像 -->
<img src="./gym.k.jpg">

<!-- 強み -->
<section>
  <h2>【選ばれる理由】</h2>

  <div class="card">
    完全マンツーマン指導
  </div>

  <div class="card">
    食事サポートあり
  </div>

  <div class="card">
    ボディメイク大会入賞者が対応
  </div>

</section>

<!-- 料金 -->
<section class="cta">
  <h2>月4回 20,000円</h2>
</section>

<!-- 体験 -->
<section>
  <h2>⭐️まずは500円(30分間)から体験⭐️</h2>
</section>

<!-- 画像 -->
<img src="./gym.500yen.jpg">
<img src="./images.gym.jpeg">
<img src="./lp.gym.jpg">

<!-- LINEボタン -->
<a href="https://lin.ee/98zcZXy" class="line-btn">
  LINE予約はこちら
</a>

</body>
</html>
