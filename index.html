<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym 診断</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'ここにピクセルID');
fbq('track', 'PageView');
</script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
  text-align: center;
}

header {
  padding: 60px 20px 20px;
}

header h1 {
  font-size: 24px;
  line-height: 1.5;
}

.start-btn {
  display: block;
  margin: 20px auto;
  padding: 15px;
  max-width: 300px;
  background: #ffcc00;
  color: #000;
  border-radius: 10px;
  font-weight: bold;
  text-decoration: none;
}

section {
  padding: 40px 20px;
}

button {
  display: block;
  width: 90%;
  max-width: 320px;
  margin: 10px auto;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #ffcc00;
  color: #000;
  font-size: 16px;
  font-weight: bold;
}

.hidden {
  display: none;
}

.result {
  font-size: 20px;
  font-weight: bold;
  margin-top: 20px;
}

.line-btn {
  display: block;
  margin: 30px auto;
  background: #00c300;
  color: #fff;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  max-width: 300px;
}
</style>
</head>

<body>

<!-- 🔥ここ追加した部分 -->
<header>
<h1>
30秒であなたに合う<br>
ダイエット・トレーニング方法がわかる
</h1>

<a href="#q1" class="start-btn">
無料診断をはじめる
</a>

<p style="font-size:12px; color:#ccc;">
※初心者の方がほとんどです
</p>
</header>

<!-- 質問① -->
<section id="q1">
<h2>あなたの目的は？</h2>
<button onclick="next('q2')">ダイエットしたい</button>
<button onclick="next('q2')">筋肉をつけたい</button>
<button onclick="next('q2')">健康・運動不足解消</button>
</section>

<!-- 質問② -->
<section id="q2" class="hidden">
<h2>今の悩みは？</h2>
<button onclick="next('q3')">体重が落ちない</button>
<button onclick="next('q3')">リバウンドした</button>
<button onclick="next('q3')">何をすればいいかわからない</button>
</section>

<!-- 質問③ -->
<section id="q3" class="hidden">
<h2>運動習慣は？</h2>
<button onclick="showResult()">ほぼしていない</button>
<button onclick="showResult()">週1くらい</button>
<button onclick="showResult()">定期的にしている</button>
</section>

<!-- 結果 -->
<section id="result" class="hidden">
<h2>診断結果</h2>

<p class="result">
あなたは「自己流で失敗しやすいタイプ」です
</p>

<p>
正しいトレーニングと食事管理で<br>
最短で理想の体に近づけます🔥
</p>

<p style="color:#ffcc00; font-weight:bold;">
今なら初回体験500円
</p>

<a href="https://lin.ee/tLpiKUi"
onclick="fbq('track','Lead')"
class="line-btn">
LINEで体験予約する
</a>

<p style="font-size:12px; color:#ccc;">
※無理な勧誘はありません
</p>
</section>

<script>
function next(nextId){
  document.querySelectorAll("section").forEach(el => el.classList.add("hidden"));
  document.getElementById(nextId).classList.remove("hidden");
}

function showResult(){
  document.querySelectorAll("section").forEach(el => el.classList.add("hidden"));
  document.getElementById("result").classList.remove("hidden");
  fbq('track','Lead');
}
</script>

</body>
</html>
