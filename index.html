<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f0f;
  color: #fff;
}

img {
  width: 100%;
  display: block;
}

section {
  padding: 60px 20px;
  text-align: center;
}

.cta {
  background: linear-gradient(45deg, #ffcc00, #ff9900);
  color: #000;
  padding: 40px 20px;
}

.cta a {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: #000;
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

.dark {
  background: #1a1a1a;
}

.gold {
  color: #ffcc00;
  font-weight: bold;
}

.card {
  background: #222;
  padding: 20px;
  margin: 10px auto;
  max-width: 300px;
  border-radius: 10px;
}
</style>

</head>

<body>

<!-- 上バナー -->
<img src="./banner.gym.jpeg">

<!-- CTA -->
<section class="cta">
  <h2>入会金無料</h2>
  <p><strong>500円で体験できます</strong></p>
  <a href="#">LINEで予約する</a>
</section>

<!-- コンセプト -->
<section>
  <h2>結果にこだわるパーソナルジム</h2>
  <p>
    完全個別指導で最短で理想の身体へ<br>
    <span class="gold">大人のための本格トレーニング</span>
  </p>
</section>

<!-- 中央画像 -->
<img src="./gym.k.jpeg">

<!-- 強み -->
<section class="dark">
  <h2>選ばれる理由</h2>

  <div class="card">
    <h3>完全マンツーマン</h3>
    <p>あなた専用メニュー</p>
  </div>

  <div class="card">
    <h3>食事サポート</h3>
    <p>無理なく続く指導</p>
  </div>

  <div class="card">
    <h3>少人数制</h3>
    <p>最大2名まで</p>
  </div>

</section>

<!-- 料金 -->
<section>
  <h2>料金</h2>
  <p>
    月4回コース<br>
    <span class="gold" style="font-size:28px;">20,000円</span><br>
    （1回50分）
  </p>
</section>

<!-- 体験 -->
<section class="cta">
  <h2>まずは500円体験</h2>
  <a href="#">今すぐ予約</a>
</section>

<!-- その他画像 -->
<img src="./gym.500yen.jpg">
<img src="./images.gym.jpeg">
<img src="./lp.gym.jpg">

<!-- クロージング -->
<section class="dark">
  <h2>変わるなら今</h2>
  <p>あなたも理想の体へ</p>
</section>

</body>
</html>
