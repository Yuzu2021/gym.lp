<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym 診断</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'ここにピクセルID');
fbq('track', 'PageView');
</script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
  text-align: center;
}

header {
  padding: 40px 20px;
}

section {
  padding: 30px 20px;
}

button {
  display: block;
  width: 90%;
  max-width: 320px;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #ffcc00;
  color: #000;
  font-weight: bold;
}

.hidden {
  display: none;
}

.line-btn {
  display: block;
  margin: 30px auto;
  background: #00c300;
  color: #fff;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  max-width: 300px;
}
</style>
</head>

<body>

<header>
<h1>30秒であなたに合う<br>トレーニング方法がわかる</h1>
<p style="font-size:12px;">※初心者の方がほとんどです</p>
</header>

<!-- Q1 -->
<section id="q1">
<h2>あなたの目的は？</h2>
<button onclick="setType('diet')">ダイエット</button>
<button onclick="setType('muscle')">筋肉をつけたい</button>
<button onclick="setType('health')">健康・運動不足解消</button>
</section>

<!-- Q2 -->
<section id="q2" class="hidden">
<h2>今の悩みは？</h2>
<button onclick="setLevel('low')">体重が落ちない</button>
<button onclick="setLevel('mid')">リバウンドした</button>
<button onclick="setLevel('high')">何をすればいいかわからない</button>
</section>

<!-- Q3 -->
<section id="q3" class="hidden">
<h2>運動習慣は？</h2>
<button onclick="showResult('beginner')">ほぼしていない</button>
<button onclick="showResult('middle')">週1くらい</button>
<button onclick="showResult('advanced')">定期的にしている</button>
</section>

<!-- RESULT -->
<section id="result" class="hidden">
<h2>診断結果</h2>
<p id="resultText"></p>

<p style="color:#ffcc00; font-weight:bold;">
今なら初回体験500円
</p>

<a href="https://lin.ee/tLpiKUi"
onclick="fbq('track','Lead')"
class="line-btn">
LINEで体験予約する
</a>
</section>

<script>
let userType = "";
let userLevel = "";

function setType(type){
  userType = type;
  next('q2');
}

function setLevel(level){
  userLevel = level;
  next('q3');
}

function next(id){
  document.querySelectorAll("section").forEach(el => el.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function showResult(activity){
  let text = "";

  if(userType === "diet"){
    text = "あなたは【痩せたいのに続かないタイプ】です。<br>プロのサポートで一気に変われます🔥";
  } else if(userType === "muscle"){
    text = "あなたは【自己流で伸び悩みタイプ】です。<br>正しいフォームと食事で一気に変わります💪";
  } else {
    text = "あなたは【運動不足改善タイプ】です。<br>無理なく継続できる環境が必要です✨";
  }

  document.getElementById("resultText").innerHTML = text;

  document.querySelectorAll("section").forEach(el => el.classList.add("hidden"));
  document.getElementById("result").classList.remove("hidden");

  fbq('track','Lead');
}
</script>

</body>
</html>
