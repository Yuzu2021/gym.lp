<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym 診断</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'ここにピクセルID');
fbq('track', 'PageView');
</script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.progress {
  height: 6px;
  background: #333;
  border-radius: 10px;
  margin-bottom: 20px;
}

.progress-bar {
  height: 6px;
  background: #ffcc00;
  width: 0%;
  border-radius: 10px;
  transition: 0.3s;
}

.fade {
  animation: fadeIn 0.5s;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 16px;
  border: none;
  border-radius: 10px;
  background: #ffcc00;
  color: #000;
  font-weight: bold;
  font-size: 16px;
}

.hidden {
  display: none;
}

.line-btn {
  display: block;
  margin-top: 20px;
  padding: 18px;
  background: #00c300;
  color: #fff;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
}

.small {
  font-size: 12px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- 共感 -->
<div id="intro" class="fade">
<h2>こんなお悩みありませんか？</h2>
<p>
・何をしても痩せない<br>
・リバウンドばかり<br>
・運動が続かない
</p>

<button onclick="start()">はい、あります</button>
</div>

<!-- プログレス -->
<div class="progress hidden" id="progressWrap">
<div class="progress-bar" id="progressBar"></div>
</div>

<!-- Q1 -->
<div id="q1" class="hidden fade">
<h3>Q1. あなたの目的は？</h3>
<button onclick="next(1,'diet')">本気で痩せたい</button>
<button onclick="next(1,'muscle')">かっこいい体になりたい</button>
<button onclick="next(1,'health')">健康目的</button>
</div>

<!-- Q2 -->
<div id="q2" class="hidden fade">
<h3>Q2. 今一番の悩みは？</h3>
<button onclick="next(2)">何をしても痩せない</button>
<button onclick="next(2)">リバウンド</button>
<button onclick="next(2)">やり方がわからない</button>
</div>

<!-- Q3 -->
<div id="q3" class="hidden fade">
<h3>Q3. 運動習慣は？</h3>
<button onclick="showResult()">ほぼしていない</button>
<button onclick="showResult()">週1くらい</button>
<button onclick="showResult()">定期的にしている</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden fade">
<h2>診断結果</h2>

<p id="resultText"></p>

<p>
多くの人が間違った方法で失敗しています。<br>
正しい方法なら変われます。
</p>

<p style="color:#ffcc00; font-weight:bold;">
先着10名限定：体験500円
</p>

<p class="small">
・初心者90%以上<br>
・3ヶ月で−8kg実績あり
</p>

<a href="https://lin.ee/tLpiKUi"
onclick="fbq('track','Lead')"
class="line-btn">
今すぐ無料で相談する
</a>

<p class="small">
※無理な勧誘はありません
</p>

</div>

</div>

<script>
let step = 0;
let userType = "";

function start(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("progressWrap").classList.remove("hidden");
  document.getElementById("q1").classList.remove("hidden");
  updateProgress();
}

function next(q, type){
  if(type) userType = type;
  document.getElementById("q"+q).classList.add("hidden");
  document.getElementById("q"+(q+1)).classList.remove("hidden");
  step++;
  updateProgress();
}

function updateProgress(){
  let percent = (step/3)*100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showResult(){
  document.getElementById("q3").classList.add("hidden");

  let text = "";
  if(userType === "diet"){
    text = "あなたは【痩せたいのに続かず失敗してきたタイプ】です";
  } else if(userType === "muscle"){
    text = "あなたは【自己流で伸び悩んでいるタイプ】です";
  } else {
    text = "あなたは【運動不足改善が必要なタイプ】です";
  }

  document.getElementById("resultText").innerHTML = text;
  document.getElementById("result").classList.remove("hidden");

  fbq('track','Lead');
}
</script>

</body>
</html>
