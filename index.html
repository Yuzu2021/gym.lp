<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
}

/* 画像 */
img {
  width: 100%;
  display: block;
}

/* セクション */
section {
  padding: 60px 20px;
  text-align: center;
}

/* CTA */
.cta {
  background: linear-gradient(45deg, #ffcc00, #ff6600);
  color: #000;
}

/* カード */
.card {
  background: rgba(0,0,0,0.7);
  margin: 10px auto;
  padding: 20px;
  max-width: 300px;
  border-radius: 10px;
}

/* LINEボタン */
.line-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00c300;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  animation: bounce 1.5s infinite;
}

/* 電話ボタン（画像の上に透明で配置） */
.tel-wrap {
  position: relative;
}

.tel-btn {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 80px;
}

/* アニメーション */
@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* 見出し */
.gold {
  color: #ffcc00;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- バナー -->
<img src="./banner.gym.jpg">

<!-- CTA -->
<section class="cta">
  <h2>🌟入会金無料🌟</h2>
  <p><strong>「500円」で体験‼️</strong></p>
</section>

<!-- 外観 -->
<img src="./gaikan.jpg">

<!-- コンセプト -->
<section>
  <h2>✨理想の身体を手に入れる✨</h2>
  <p class="gold">本気で変わりたいあなたへ</p>
</section>
  
<!-- ジム内装 -->
<img src="./S__71884805_0.jpg">
  
<!-- メイン -->
<img src="./gym.k.jpg">

<!-- 強み -->
<section>
  <h2>【選ばれる理由】</h2>

  <div class="card">💪知識豊富なプロからの指導‼️</div>
  <div class="card">🍖食事サポートあり🍽️</div>
  <div class="card">🏋️ボディメイク大会入賞者の在籍🎖️</div>

</section>

<!-- トレーナー -->
<img src="./3.jpg">
<img src="./2.jpg">

<!-- 料金 -->
<section class="cta">
  <h2>【月額制】</h2>
</section>

<section class="cta">
  <h2>月4回 20,000円</h2>
</section>

<section class="cta">
  <h4>※残った回数の翌月への繰越はございません</h4>
</section>

<!-- 体験 -->
<section>
  <h2>⭐️まずは500円(30分間)で体験⭐️</h2>
</section>

<!-- 画像 -->
<img src="./gym.500yen.jpg">
<img src="./images.gym.jpeg">

<!-- 🔥電話ボタン付き画像 -->
<div class="tel-wrap">
  <img src="./lp.gym.jpg">
  <a href="tel:09023559371" class="tel-btn"></a>
</div>

<!-- LINEボタン -->
<a href="https://lin.ee/98zcZXy" class="line-btn">
  LINE予約はこちら
</a>

</body>
</html>
